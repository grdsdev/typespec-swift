name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump: "patch", "minor", "major", or an explicit semver (e.g. "1.2.3")'
        required: true
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "${{ github.event.inputs.version }}"

      - name: Publish to npm
        # Uses npm Trusted Publishing (OIDC) -- no NPM_TOKEN secret needed.
        # Requires the "typespec-swift" package's npmjs.com Settings ->
        # Trusted Publisher to be configured for this repo + workflow file
        # (one-time setup, after the very first manual `npm publish`).
        run: npm publish --access public --provenance

      - name: Push version bump and tag
        run: git push --follow-tags
